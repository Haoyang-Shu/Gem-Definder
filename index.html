<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>宝石迷航者 · 星穹射手 | 修复按钮+血条</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f2a, #020617);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Courier New', monospace;
            touch-action: none;
        }

        .game-wrapper {
            background: #00000055;
            border-radius: 48px;
            padding: 16px 20px 24px;
            backdrop-filter: blur(3px);
            box-shadow: 0 25px 40px rgba(0,0,0,0.5);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 32px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.1);
            cursor: none;
            background: #030318;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 18px 12px 10px 12px;
            color: #f5f0e0;
            text-shadow: 0 2px 3px black;
            gap: 12px;
            flex-wrap: wrap;
        }

        .stats {
            display: flex;
            gap: 20px;
            background: #1e293bc9;
            backdrop-filter: blur(8px);
            padding: 6px 20px;
            border-radius: 80px;
            border: 1px solid #ffd966;
        }

        .stat {
            font-weight: bold;
            font-size: 1.3rem;
            letter-spacing: 1px;
            font-family: monospace;
        }

        .stat span {
            font-size: 0.85rem;
            font-weight: normal;
            margin-right: 6px;
            color: #ffdfa5;
        }

        button {
            background: #e67e22;
            border: none;
            font-weight: bold;
            padding: 8px 32px;
            border-radius: 60px;
            color: white;
            font-family: inherit;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 0 #b45f1b;
            letter-spacing: 1px;
        }
        
        button:hover {
            background: #f39c12;
            transform: translateY(-1px);
            box-shadow: 0 5px 0 #b45f1b;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #b45f1b;
        }

        .controls-hint {
            text-align: center;
            margin-top: 12px;
            font-size: 0.75rem;
            background: #00000070;
            padding: 6px 18px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            color: #ffecb3;
        }

        @media (max-width: 700px) {
            .game-wrapper { padding: 12px; }
            .stat { font-size: 1.1rem; }
            .controls-hint { font-size: 0.65rem; }
            button { padding: 6px 24px; font-size: 1rem; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-wrapper">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="info-panel">
            <div class="stats">
                <div class="stat"><span>❤️ 生命</span> <span id="hpValue">5</span></div>
                <div class="stat"><span>💎 宝石</span> <span id="scoreValue">0</span></div>
                <div class="stat"><span>⚡ 击杀</span> <span id="killValue">0</span></div>
            </div>
            <button id="resetBtn">✨ 重新启航</button>
        </div>
        <div class="controls-hint">
            🖱️ 鼠标 / 手指 移动 → 控制飞船 &nbsp;&nbsp;| &nbsp;🔫 自动连射 &nbsp;&nbsp;| &nbsp;🧠 敌人只从上方/左右来袭
        </div>
    </div>
</div>

<script>
    (function(){
        // -------- 画布元素 ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // ---------- 固定尺寸 ----------
        const W = 800, H = 600;
        canvas.width = W;
        canvas.height = H;
        
        // ---------- 游戏核心状态 ----------
        let gameActive = true;
        let player = {
            x: W/2,
            y: H - 70,
            radius: 18,
            hp: 5,
            maxHp: 8
        };
        
        // 子弹系统
        let bullets = [];
        const BULLET_RADIUS = 5;
        const BULLET_SPEED = -7.2;
        let shootCooldown = 0;
        const SHOOT_DELAY_FRAMES = 9;
        
        // 敌人系统
        let enemies = [];
        const ENEMY_BASE_RADIUS = 14;
        let enemySpawnCounter = 0;
        let enemySpawnBaseDelay = 42;
        
        // 宝石系统
        let gems = [];
        const GEM_RADIUS = 8;
        
        // 特效
        let hitEffects = [];
        
        // 分数统计
        let gemScore = 0;
        let killCount = 0;
        
        // 动态难度
        let difficultyFactor = 1.0;
        
        // 移动控制
        let targetX = player.x;
        
        // 无敌帧
        let invincibleFrames = 0;
        const INVINCIBLE_DURATION = 28;
        
        // UI元素
        const hpSpan = document.getElementById('hpValue');
        const scoreSpan = document.getElementById('scoreValue');
        const killSpan = document.getElementById('killValue');
        const resetBtn = document.getElementById('resetBtn');
        
        function updateUI() {
            hpSpan.innerText = player.hp;
            scoreSpan.innerText = gemScore;
            killSpan.innerText = killCount;
        }
        
        function addGemScore(amount) {
            gemScore += amount;
            updateUI();
        }
        
        function addKill() {
            killCount++;
            updateUI();
            let kills = killCount;
            let newDelay = Math.max(24, 42 - Math.floor(kills / 9));
            enemySpawnBaseDelay = newDelay;
        }
        
        function damagePlayer(amount) {
            if(!gameActive) return;
            if(invincibleFrames > 0) return;
            player.hp = Math.max(0, player.hp - amount);
            updateUI();
            if(player.hp <= 0) {
                gameActive = false;
            } else {
                invincibleFrames = INVINCIBLE_DURATION;
                for(let i=0;i<12;i++) {
                    hitEffects.push({
                        x: player.x + (Math.random() - 0.5)*30,
                        y: player.y + (Math.random() - 0.5)*20,
                        life: 0.7,
                        size: Math.random()*3+2,
                        color: `hsl(${Math.random()*20 + 350}, 80%, 60%)`
                    });
                }
            }
        }
        
        function healPlayer(amount) {
            if(!gameActive) return;
            player.hp = Math.min(player.maxHp, player.hp + amount);
            updateUI();
            for(let i=0;i<8;i++) {
                hitEffects.push({
                    x: player.x + (Math.random()-0.5)*25,
                    y: player.y + (Math.random()-0.5)*20,
                    life: 0.9,
                    size: Math.random()*4+2,
                    color: `hsl(120, 70%, 65%)`
                });
            }
        }
        
        // 生成敌人 - 绝不下方出生
        function spawnEnemy() {
            let side = Math.floor(Math.random() * 3); // 0:上 1:左 2:右
            let x, y;
            const padding = 40;
            let maxYAllowed = H - 100; // 避免太靠近底部
            
            if(side === 0) {
                x = Math.random() * (W - 80) + 40;
                y = -padding;
            } else if(side === 1) {
                x = -padding;
                y = Math.random() * (maxYAllowed - 80) + 40;
            } else {
                x = W + padding;
                y = Math.random() * (maxYAllowed - 80) + 40;
            }
            
            if(y > H - 90) {
                y = Math.random() * (H - 150) + 30;
            }
            
            let spd = 2.1 + Math.min(2.9, difficultyFactor * 1.1);
            let extraSpeed = Math.min(1.5, killCount / 55);
            let finalSpeed = spd + extraSpeed;
            
            enemies.push({
                x: x, y: y,
                radius: ENEMY_BASE_RADIUS,
                hp: 1,
                speed: finalSpeed,
                color: `hsl(${Math.random() * 20 + 340}, 70%, 55%)`
            });
        }
        
        function spawnGem(x, y, isHealth = false) {
            gems.push({
                x: x, y: y,
                radius: GEM_RADIUS,
                isHealth: isHealth,
                magnet: false
            });
        }
        
        function killEnemy(index, enemyX, enemyY) {
            let enemy = enemies[index];
            if(!enemy) return;
            enemies.splice(index,1);
            addKill();
            
            let dropCount = Math.random() > 0.4 ? 1 : 2;
            for(let i=0;i<dropCount;i++) {
                spawnGem(enemyX + (Math.random()-0.5)*12, enemyY + (Math.random()-0.5)*12, false);
            }
            
            if(Math.random() < 0.12 && player.hp < player.maxHp) {
                spawnGem(enemyX, enemyY, true);
                hitEffects.push({
                    x: enemyX, y: enemyY, life: 0.8, size: 9, color: "#82ff9e"
                });
            }
            
            for(let i=0;i<14;i++) {
                hitEffects.push({
                    x: enemyX + (Math.random()-0.5)*12,
                    y: enemyY + (Math.random()-0.5)*12,
                    life: 0.6,
                    size: Math.random()*4+3,
                    color: `orange`
                });
            }
        }
        
        // 重置游戏 - 确保所有状态归零
        function resetGame() {
            gameActive = true;
            player.hp = 5;
            player.x = W/2;
            player.y = H - 70;
            targetX = player.x;
            bullets = [];
            enemies = [];
            gems = [];
            hitEffects = [];
            gemScore = 0;
            killCount = 0;
            invincibleFrames = 0;
            shootCooldown = 0;
            enemySpawnCounter = 12;
            enemySpawnBaseDelay = 42;
            difficultyFactor = 1.0;
            updateUI();
        }
        
        // 游戏逻辑更新
        function updateGame() {
            if(!gameActive) return;
            
            difficultyFactor = 1.0 + (killCount / 95);
            if(difficultyFactor > 2.2) difficultyFactor = 2.2;
            
            // 玩家移动
            let dx = targetX - player.x;
            player.x += dx * 0.28;
            player.x = Math.min(Math.max(player.x, player.radius + 8), W - player.radius - 8);
            player.y = H - 70;
            
            if(invincibleFrames > 0) invincibleFrames--;
            
            // 自动射击
            if(shootCooldown <= 0) {
                bullets.push({
                    x: player.x,
                    y: player.y - 10,
                    radius: BULLET_RADIUS,
                    vx: 0,
                    vy: BULLET_SPEED
                });
                shootCooldown = SHOOT_DELAY_FRAMES;
            } else {
                shootCooldown--;
            }
            
            // 子弹移动与碰撞
            for(let i=0; i<bullets.length; i++) {
                bullets[i].x += bullets[i].vx;
                bullets[i].y += bullets[i].vy;
                if(bullets[i].y + BULLET_RADIUS < 0 || bullets[i].y - BULLET_RADIUS > H ||
                   bullets[i].x + BULLET_RADIUS < 0 || bullets[i].x - BULLET_RADIUS > W) {
                    bullets.splice(i,1);
                    i--;
                    continue;
                }
                let hit = false;
                for(let j=0; j<enemies.length; j++) {
                    const e = enemies[j];
                    const dxb = bullets[i].x - e.x;
                    const dyb = bullets[i].y - e.y;
                    const dist = Math.hypot(dxb, dyb);
                    if(dist < BULLET_RADIUS + e.radius) {
                        killEnemy(j, e.x, e.y);
                        hit = true;
                        break;
                    }
                }
                if(hit) {
                    bullets.splice(i,1);
                    i--;
                }
            }
            
            // 敌人移动
            for(let i=0; i<enemies.length; i++) {
                let e = enemies[i];
                let dxE = player.x - e.x;
                let dyE = player.y - e.y;
                let len = Math.hypot(dxE, dyE);
                if(len > 0.01) {
                    let move = e.speed;
                    e.x += (dxE / len) * move;
                    e.y += (dyE / len) * move;
                }
                if(e.x + e.radius < -100 || e.x - e.radius > W+100 || e.y + e.radius < -100 || e.y - e.radius > H+120) {
                    enemies.splice(i,1);
                    i--;
                    continue;
                }
                const distToPlayer = Math.hypot(e.x - player.x, e.y - player.y);
                if(distToPlayer < e.radius + player.radius) {
                    damagePlayer(1);
                    enemies.splice(i,1);
                    i--;
                    for(let p=0;p<6;p++) hitEffects.push({x:player.x+(Math.random()-0.5)*18, y:player.y+(Math.random()-0.5)*18, life:0.5, size:3, color:"#ff8866"});
                }
            }
            
            // 宝石收集
            for(let i=0; i<gems.length; i++) {
                let g = gems[i];
                let dxG = player.x - g.x;
                let dyG = player.y - g.y;
                let dist = Math.hypot(dxG, dyG);
                if(dist < player.radius + g.radius) {
                    if(g.isHealth === true) {
                        healPlayer(1);
                    } else {
                        addGemScore(1);
                    }
                    for(let f=0;f<6;f++) hitEffects.push({x:g.x, y:g.y, life:0.5, size:4, color:"#f7d44a"});
                    gems.splice(i,1);
                    i--;
                    continue;
                }
                let attract = g.isHealth ? 0.1 : 0.14;
                let moveX = dxG * attract;
                let moveY = dyG * attract;
                g.x += moveX;
                g.y += moveY;
                g.x = Math.min(Math.max(g.x, -20), W+20);
                g.y = Math.min(Math.max(g.y, -20), H+20);
            }
            
            // 生成敌人
            if(enemySpawnCounter <= 0) {
                let spawnCount = 1;
                if(Math.random()<0.2 && killCount>15 && enemies.length < 20) spawnCount = 2;
                for(let s=0;s<spawnCount;s++) {
                    if(enemies.length < 35) spawnEnemy();
                }
                let dynamicDelay = Math.max(22, enemySpawnBaseDelay - Math.floor(killCount/14));
                enemySpawnCounter = dynamicDelay;
            } else {
                enemySpawnCounter--;
            }
            
            if(enemies.length > 28 && enemySpawnCounter < 10) enemySpawnCounter = 12;
        }
        
        // 绘图
        function draw() {
            ctx.clearRect(0, 0, W, H);
            let grad = ctx.createLinearGradient(0,0,0,H);
            grad.addColorStop(0,"#030221");
            grad.addColorStop(1,"#110a30");
            ctx.fillStyle = grad;
            ctx.fillRect(0,0,W,H);
            
            // 星星
            for(let i=0;i<150;i++) {
                ctx.fillStyle = `rgba(255,240,200,${0.2+Math.sin(Date.now()*0.002+i)*0.15})`;
                ctx.beginPath();
                ctx.arc( (i*173)%W, (i*257)%H, 1.2, 0, Math.PI*2);
                ctx.fill();
            }
            
            // 宝石
            for(let g of gems) {
                ctx.shadowBlur = 8;
                ctx.shadowColor = "#f7c56e";
                ctx.beginPath();
                if(g.isHealth) {
                    ctx.fillStyle = "#ff8c7a";
                    ctx.arc(g.x, g.y, g.radius-1, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = "white";
                    ctx.font = "bold 13px monospace";
                    ctx.shadowBlur = 2;
                    ctx.fillText("❤️", g.x-6, g.y+5);
                } else {
                    ctx.fillStyle = "#ffdf80";
                    ctx.arc(g.x, g.y, g.radius-1, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = "#ffb347";
                    ctx.arc(g.x, g.y, g.radius-3, 0, Math.PI*2);
                    ctx.fill();
                }
            }
            
            // 子弹
            for(let b of bullets) {
                ctx.fillStyle = "#f0f062";
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.rect(b.x-3, b.y-6, 6, 12);
                ctx.fill();
                ctx.fillStyle = "white";
                ctx.beginPath();
                ctx.rect(b.x-1.5, b.y-10, 3, 6);
                ctx.fill();
            }
            
            // 敌人
            for(let e of enemies) {
                ctx.shadowBlur = 5;
                ctx.fillStyle = e.color;
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.radius-2, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#2c1e2a";
                ctx.beginPath();
                ctx.ellipse(e.x-3, e.y-2, 2, 3, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "white";
                ctx.beginPath();
                ctx.arc(e.x-4, e.y-3, 1.2, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#ff5533";
                ctx.beginPath();
                ctx.ellipse(e.x+2, e.y+2, 3,2,0,0,Math.PI*2);
                ctx.fill();
            }
            
            // 玩家飞船
            ctx.shadowBlur = 12;
            let invAlpha = (invincibleFrames>0 && (Math.floor(Date.now()/50)%3===0));
            ctx.fillStyle = invAlpha ? "#f5bc70" : "#6dc6ff";
            ctx.beginPath();
            ctx.moveTo(player.x, player.y-18);
            ctx.lineTo(player.x-15, player.y+5);
            ctx.lineTo(player.x-5, player.y+2);
            ctx.lineTo(player.x-5, player.y+12);
            ctx.lineTo(player.x, player.y+8);
            ctx.lineTo(player.x+5, player.y+12);
            ctx.lineTo(player.x+5, player.y+2);
            ctx.lineTo(player.x+15, player.y+5);
            ctx.fill();
            ctx.fillStyle = "#aae0ff";
            ctx.beginPath();
            ctx.arc(player.x, player.y-8, 8, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#1d3557";
            ctx.beginPath();
            ctx.arc(player.x-3, player.y-10, 2, 0, Math.PI*2);
            ctx.arc(player.x+3, player.y-10, 2, 0, Math.PI*2);
            ctx.fill();
            
            // 特效
            for(let i=0;i<hitEffects.length;i++) {
                let p = hitEffects[i];
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color || "#ffb347";
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
                p.life -= 0.03;
                if(p.life<=0) { hitEffects.splice(i,1); i--; }
            }
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
            
            // 游戏结束画面
            if(!gameActive) {
                ctx.font = "bold 36px 'Segoe UI', monospace";
                ctx.fillStyle = "#ffdfb3";
                ctx.shadowBlur = 6;
                ctx.fillText("💀 游戏终结 💀", W/2-135, H/2-50);
                ctx.font = "24px monospace";
                ctx.fillStyle = "#f7c56e";
                ctx.fillText(`✨ 宝石: ${gemScore}   🔥 歼灭: ${killCount}`, W/2-170, H/2+30);
                ctx.font = "18px monospace";
                ctx.fillStyle = "#cdd9ff";
                ctx.fillText("点击「重新启航」继续冒险", W/2-145, H/2+100);
            }
            
            // 血条 - 修复位置，现在使用正确的Y坐标 player.y-32
            ctx.fillStyle = "#330000";
            ctx.fillRect(player.x-30, player.y-32, 60, 10);
            ctx.fillStyle = "#ff5555";
            let hpPercent = player.hp / player.maxHp;
            ctx.fillRect(player.x-30, player.y-32, 60 * hpPercent, 8);
            ctx.fillStyle = "white";
            ctx.font = "bold 11px monospace";
            ctx.fillText(`${player.hp}/${player.maxHp}`, player.x-18, player.y-34);
        }
        
        // 控制事件
        function handleMove(clientX, clientY) {
            if(!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            let canvasX = (clientX - rect.left) * scaleX;
            canvasX = Math.min(Math.max(canvasX, player.radius+5), W - player.radius-5);
            targetX = canvasX;
        }
        
        function onPointerMove(e) {
            e.preventDefault();
            let clientX = e.clientX;
            if(e.touches) clientX = e.touches[0].clientX;
            handleMove(clientX, e.clientY);
        }
        
        function initEvents() {
            canvas.addEventListener('mousemove', onPointerMove);
            canvas.addEventListener('touchmove', onPointerMove, {passive: false});
            canvas.addEventListener('touchstart', (e) => { 
                e.preventDefault(); 
                if(e.touches && gameActive) handleMove(e.touches[0].clientX, e.touches[0].clientY);
            });
        }
        
        // 重置按钮事件 - 确保正常工作
        resetBtn.addEventListener('click', (e) => {
            e.preventDefault();
            resetGame();
        });
        
        function gameLoop() {
            updateGame();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        resetGame();
        initEvents();
        gameLoop();
    })();
</script>
</body>
</html>
