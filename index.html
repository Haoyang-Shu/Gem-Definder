<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>宝石迷航者 · 星穹射手 | 完整界面+武器升级+Boss战+技能系统</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f2a, #020617);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Courier New', monospace;
            touch-action: none;
        }

        /* 主菜单/游戏结束遮罩层 */
        .ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: all 0.3s ease;
        }

        .menu-panel {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-radius: 48px;
            padding: 30px 40px;
            text-align: center;
            border: 2px solid #ffd966;
            box-shadow: 0 25px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            max-width: 400px;
            width: 85%;
        }

        .menu-panel h1 {
            font-size: 2.2rem;
            margin: 0 0 10px;
            color: #ffdf8c;
            text-shadow: 0 2px 5px #00000050;
            letter-spacing: 2px;
        }

        .menu-panel .sub {
            color: #aac8ff;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        .menu-stats {
            background: #00000060;
            border-radius: 32px;
            padding: 15px;
            margin: 20px 0;
            font-size: 1.1rem;
        }

        .menu-stats p {
            margin: 8px 0;
            color: #f5e0c0;
        }

        .menu-btn {
            background: #e67e22;
            border: none;
            font-weight: bold;
            padding: 12px 32px;
            border-radius: 60px;
            color: white;
            font-family: inherit;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 15px;
            box-shadow: 0 5px 0 #b45f1b;
        }

        .menu-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #b45f1b;
        }

        .game-wrapper {
            background: #00000055;
            border-radius: 48px;
            padding: 16px 20px 24px;
            backdrop-filter: blur(3px);
            box-shadow: 0 25px 40px rgba(0,0,0,0.5);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 32px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.1);
            cursor: none;
            background: #030318;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 18px 12px 10px 12px;
            color: #f5f0e0;
            text-shadow: 0 2px 3px black;
            gap: 12px;
            flex-wrap: wrap;
        }

        .stats {
            display: flex;
            gap: 12px;
            background: #1e293bc9;
            backdrop-filter: blur(8px);
            padding: 6px 18px;
            border-radius: 80px;
            border: 1px solid #ffd966;
            flex-wrap: wrap;
        }

        .stat {
            font-weight: bold;
            font-size: 1rem;
            font-family: monospace;
        }

        .stat span {
            font-size: 0.7rem;
            font-weight: normal;
            margin-right: 4px;
            color: #ffdfa5;
        }

        .weapon-level {
            background: #ff6b35cc;
            border-color: #ffaa66;
        }

        .skill-cooldown {
            background: #3b2a6ecc;
            border-color: #b87cff;
        }

        button {
            background: #e67e22;
            border: none;
            font-weight: bold;
            padding: 6px 24px;
            border-radius: 60px;
            color: white;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 3px 0 #b45f1b;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #b45f1b;
        }

        .controls-hint {
            text-align: center;
            margin-top: 12px;
            font-size: 0.65rem;
            background: #00000070;
            padding: 5px 12px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            color: #ffecb3;
        }

        .skill-hint {
            color: #aaffdd;
            font-weight: bold;
        }

        @media (max-width: 700px) {
            .game-wrapper { padding: 10px; }
            .stat { font-size: 0.8rem; }
            .stats { gap: 8px; padding: 4px 12px; }
            button { padding: 4px 16px; font-size: 0.75rem; }
            .controls-hint { font-size: 0.5rem; }
        }
    </style>
</head>
<body>
<div id="mainMenu" class="ui-overlay">
    <div class="menu-panel">
        <h1>✨ 宝石迷航者 ✨</h1>
        <div class="sub">星穹射手 · 终极版</div>
        <div class="menu-stats">
            <p>🚀 武器升级: 拾取橙色芯片提升火力</p>
            <p>⚡ 技能: 空格 / 点击技能按钮 → 时间减速</p>
            <p>👑 Boss: 每15击杀召唤精英巨兽</p>
            <p>📈 等级提升增加最大生命 & 回满血</p>
        </div>
        <button class="menu-btn" id="startGameBtn">🪐 开始远征 🪐</button>
    </div>
</div>

<div class="game-wrapper" style="display: none;" id="gameWrapper">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div class="info-panel">
        <div class="stats">
            <div class="stat"><span>❤️</span> <span id="hpValue">5</span></div>
            <div class="stat"><span>⭐</span> <span id="levelValue">1</span></div>
            <div class="stat"><span>📊</span> <span id="expValue">0</span>/<span id="expNextValue">10</span></div>
            <div class="stat"><span>💎</span> <span id="scoreValue">0</span></div>
            <div class="stat"><span>⚡</span> <span id="killValue">0</span></div>
            <div class="stat weapon-level"><span>🔫</span> Lv.<span id="weaponLvValue">1</span></div>
            <div class="stat skill-cooldown"><span>⏳</span> <span id="skillCdValue">Ready</span></div>
        </div>
        <button id="resetBtn">✨ 重来</button>
    </div>
    <div class="controls-hint">
        🖱️ 鼠标/手指移动 | 🔫 自动连射 | <span class="skill-hint">⚡ 技能(减速) → 点击下方按钮</span> | 💪 武器芯片升级
    </div>
    <div style="display: flex; justify-content: center; margin-top: 8px;">
        <button id="skillBtn" style="background:#6c5ce7; box-shadow:0 3px 0 #3b2a6e;">🌀 释放技能 (时缓)🌀</button>
    </div>
</div>

<script>
    (function(){
        // DOM 元素
        const mainMenu = document.getElementById('mainMenu');
        const gameWrapper = document.getElementById('gameWrapper');
        const startBtn = document.getElementById('startGameBtn');
        const resetBtn = document.getElementById('resetBtn');
        const skillBtn = document.getElementById('skillBtn');
        
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const W = 800, H = 600;
        canvas.width = W;
        canvas.height = H;
        
        // ---------- 游戏状态 ----------
        let gameActive = true;
        let gameLoopId = null;
        
        // 玩家属性
        let player = {
            x: W/2, y: H - 70, radius: 18, hp: 5, maxHp: 8, level: 1, exp: 0
        };
        
        // 武器系统
        let weaponLevel = 1;        // 1=单发, 2=双发, 3=三路散射, 4=五路散射
        let bullets = [];
        let shootCooldown = 0;
        const BASE_SHOOT_DELAY = 9;
        
        // 动态难度 & 敌人
        let enemies = [];
        let enemySpawnCounter = 0;
        let enemySpawnBaseDelay = 42;
        let killCount = 0;
        let bossActive = false;
        let bossHp = 0;
        let bossMaxHp = 0;
        
        // 宝石 + 武器芯片
        let gems = [];
        let weaponChips = [];   // 橙色芯片，升级武器
        
        // 特效
        let hitEffects = [];
        let gemScore = 0;       // 宝石分数
        
        // 技能系统
        let skillActive = false;
        let skillRemaining = 0;
        let skillCooldownTimer = 0;
        const SKILL_DURATION = 180;   // 3秒 (60fps)
        const SKILL_COOLDOWN_MAX = 420; // 7秒
        
        // 无敌帧 & 难度
        let invincibleFrames = 0;
        let difficultyFactor = 1.0;
        let targetX = player.x;
        
        // 经验升级阈值计算
        function getExpNeeded(level) {
            return Math.floor(10 + level * 3);
        }
        
        // UI 更新
        function updateUI() {
            document.getElementById('hpValue').innerText = player.hp;
            document.getElementById('levelValue').innerText = player.level;
            const need = getExpNeeded(player.level);
            document.getElementById('expValue').innerText = player.exp;
            document.getElementById('expNextValue').innerText = need;
            document.getElementById('scoreValue').innerText = gemScore;
            document.getElementById('killValue').innerText = killCount;
            document.getElementById('weaponLvValue').innerText = weaponLevel;
            if(skillCooldownTimer > 0) {
                let cdSec = Math.ceil(skillCooldownTimer / 60);
                document.getElementById('skillCdValue').innerText = `${cdSec}s`;
            } else if(skillActive) {
                document.getElementById('skillCdValue').innerText = "ACTIVE";
            } else {
                document.getElementById('skillCdValue').innerText = "Ready";
            }
        }
        
        // 增加经验 + 升级
        function addExp(amount) {
            if(!gameActive) return;
            player.exp += amount;
            let need = getExpNeeded(player.level);
            while(player.exp >= need && player.level < 20) {
                player.exp -= need;
                player.level++;
                // 升级奖励: 最大生命+1，并且回复满血
                player.maxHp += 1;
                player.hp = player.maxHp;
                // 升级特效
                for(let i=0;i<30;i++) {
                    hitEffects.push({
                        x: player.x + (Math.random()-0.5)*50,
                        y: player.y + (Math.random()-0.5)*40,
                        life: 0.8,
                        size: Math.random()*5+3,
                        color: `hsl(${Math.random()*60 + 40}, 90%, 65%)`
                    });
                }
                need = getExpNeeded(player.level);
            }
            updateUI();
        }
        
        // 武器升级
        function upgradeWeapon() {
            if(weaponLevel < 5) {
                weaponLevel++;
                // 升级华丽特效
                for(let i=0;i<20;i++) {
                    hitEffects.push({
                        x: player.x + (Math.random()-0.5)*40,
                        y: player.y + (Math.random()-0.5)*30,
                        life: 0.7,
                        size: 5,
                        color: "#ffa500"
                    });
                }
                updateUI();
            }
        }
        
        // 射击 (根据武器等级)
        function shoot() {
            if(!gameActive) return;
            if(weaponLevel === 1) {
                bullets.push({ x: player.x, y: player.y-10, radius: 5, vx: 0, vy: -7.5 });
            } else if(weaponLevel === 2) {
                bullets.push({ x: player.x-7, y: player.y-8, radius: 5, vx: -0.8, vy: -7.2 });
                bullets.push({ x: player.x+7, y: player.y-8, radius: 5, vx: 0.8, vy: -7.2 });
            } else if(weaponLevel === 3) {
                bullets.push({ x: player.x, y: player.y-10, radius: 5, vx: 0, vy: -7.8 });
                bullets.push({ x: player.x-9, y: player.y-6, radius: 5, vx: -1.2, vy: -7.0 });
                bullets.push({ x: player.x+9, y: player.y-6, radius: 5, vx: 1.2, vy: -7.0 });
            } else { // 4 & 5 强力散射
                bullets.push({ x: player.x, y: player.y-10, radius: 5, vx: 0, vy: -8.0 });
                bullets.push({ x: player.x-12, y: player.y-5, radius: 5, vx: -1.8, vy: -7.0 });
                bullets.push({ x: player.x+12, y: player.y-5, radius: 5, vx: 1.8, vy: -7.0 });
                bullets.push({ x: player.x-6, y: player.y-7, radius: 5, vx: -0.9, vy: -7.5 });
                bullets.push({ x: player.x+6, y: player.y-7, radius: 5, vx: 0.9, vy: -7.5 });
            }
        }
        
        // 受伤与治疗
        function damagePlayer(amount) {
            if(!gameActive) return;
            if(invincibleFrames > 0) return;
            player.hp = Math.max(0, player.hp - amount);
            updateUI();
            if(player.hp <= 0) {
                gameActive = false;
            } else {
                invincibleFrames = 25;
                for(let i=0;i<12;i++) hitEffects.push({ x: player.x+(Math.random()-0.5)*30, y: player.y+(Math.random()-0.5)*20, life:0.6, size:3, color:"#ff6666" });
            }
        }
        
        function healPlayer(amount) {
            if(!gameActive) return;
            player.hp = Math.min(player.maxHp, player.hp + amount);
            updateUI();
        }
        
        // 生成敌人 (Boss 或普通)
        function spawnEnemy() {
            if(bossActive) return;
            let side = Math.floor(Math.random() * 3);
            let x, y, maxY = H - 100;
            if(side === 0) { x = Math.random() * (W-80)+40; y = -40; }
            else if(side === 1) { x = -40; y = Math.random() * (maxY-80)+40; }
            else { x = W+40; y = Math.random() * (maxY-80)+40; }
            let spd = 2.0 + Math.min(2.5, killCount/50);
            enemies.push({ x, y, radius: 14, hp: 1, speed: spd, color: `hsl(${Math.random()*20+340},70%,55%)`, isBoss: false });
        }
        
        // 召唤Boss
        function summonBoss() {
            if(bossActive) return;
            bossActive = true;
            let side = Math.floor(Math.random() * 2);
            let x = (side === 0) ? -60 : W+60;
            let y = Math.random() * (H-150) + 70;
            let bossSpeed = 1.0 + Math.min(1.4, killCount/80);
            let hpBase = 18 + Math.floor(killCount / 8);
            bossMaxHp = Math.min(45, hpBase);
            bossHp = bossMaxHp;
            enemies.push({
                x, y, radius: 28, hp: bossHp, maxHp: bossMaxHp, speed: bossSpeed,
                color: "#d43f1f", isBoss: true, name: "⚔️ 虚空巨像 ⚔️"
            });
            // 全屏警告特效
            for(let i=0;i<40;i++) hitEffects.push({ x: Math.random()*W, y: Math.random()*H, life:0.9, size:6, color:"#ff3300" });
        }
        
        // 击杀逻辑 (普通/Boss)
        function killEnemy(idx, ex, ey) {
            let e = enemies[idx];
            if(!e) return;
            let isBossKill = e.isBoss;
            enemies.splice(idx,1);
            if(isBossKill) bossActive = false;
            // 经验
            addExp(isBossKill ? 15 : 3);
            // 击杀计数
            killCount++;
            updateUI();
            // 宝石掉落
            let drops = isBossKill ? 5 : (Math.random() > 0.5 ? 1 : 2);
            for(let i=0;i<drops;i++) gems.push({ x: ex+(Math.random()-0.5)*20, y: ey+(Math.random()-0.5)*20, radius: 7, isHealth: false });
            // 概率掉血包
            if(!isBossKill && Math.random()<0.1 && player.hp<player.maxHp) gems.push({ x: ex, y: ey, radius: 7, isHealth: true });
            // 掉武器芯片 (5% 或 Boss 100%掉落)
            if(isBossKill || (Math.random()<0.07 && weaponLevel<5)) {
                weaponChips.push({ x: ex, y: ey, radius: 9 });
            }
            // 特效
            for(let i=0;i<18;i++) hitEffects.push({ x: ex+(Math.random()-0.5)*18, y: ey+(Math.random()-0.5)*18, life:0.6, size:4, color: isBossKill ? "#ff8844" : "orange" });
            // 动态难度刷新间隔
            let newDelay = Math.max(26, 42 - Math.floor(killCount/12));
            enemySpawnBaseDelay = newDelay;
            // 每15击杀出Boss (避免刷重复)
            if(!bossActive && killCount > 0 && killCount % 15 === 0 && killCount !== 0) {
                summonBoss();
            }
        }
        
        // 重置完整游戏
        function resetGame() {
            gameActive = true;
            player = { x: W/2, y: H-70, radius: 18, hp: 5, maxHp: 8, level: 1, exp: 0 };
            weaponLevel = 1;
            bullets = [];
            enemies = [];
            gems = [];
            weaponChips = [];
            hitEffects = [];
            gemScore = 0;
            killCount = 0;
            bossActive = false;
            invincibleFrames = 0;
            shootCooldown = 0;
            enemySpawnCounter = 12;
            enemySpawnBaseDelay = 42;
            skillActive = false;
            skillRemaining = 0;
            skillCooldownTimer = 0;
            difficultyFactor = 1.0;
            targetX = player.x;
            updateUI();
        }
        
        // 游戏逻辑更新
        function updateGame() {
            if(!gameActive) return;
            
            // 技能逻辑
            if(skillActive) {
                skillRemaining--;
                if(skillRemaining <= 0) skillActive = false;
            }
            if(skillCooldownTimer > 0) skillCooldownTimer--;
            
            // 动态难度
            difficultyFactor = 1.0 + (killCount/100);
            if(difficultyFactor>2.2) difficultyFactor=2.2;
            
            // 玩家移动
            let dx = targetX - player.x;
            player.x += dx * 0.28;
            player.x = Math.min(Math.max(player.x, player.radius+8), W - player.radius-8);
            player.y = H - 70;
            if(invincibleFrames>0) invincibleFrames--;
            
            // 射击
            let actualDelay = BASE_SHOOT_DELAY;
            if(skillActive) actualDelay = Math.floor(BASE_SHOOT_DELAY * 0.4);
            if(shootCooldown <= 0) { shoot(); shootCooldown = actualDelay; }
            else shootCooldown--;
            
            // 子弹移动与碰撞
            let bulletSpeedFactor = skillActive ? 1.5 : 1.0;
            for(let i=0;i<bullets.length;i++) {
                bullets[i].x += bullets[i].vx * bulletSpeedFactor;
                bullets[i].y += bullets[i].vy * bulletSpeedFactor;
                if(bullets[i].y+6<0 || bullets[i].y-6>H || bullets[i].x+6<0 || bullets[i].x-6>W) {
                    bullets.splice(i,1); i--; continue;
                }
                let hit = false;
                for(let j=0;j<enemies.length;j++) {
                    let e = enemies[j];
                    let dist = Math.hypot(bullets[i].x - e.x, bullets[i].y - e.y);
                    if(dist < 6 + e.radius) {
                        if(e.isBoss) {
                            e.hp--;
                            if(e.hp <= 0) killEnemy(j, e.x, e.y);
                            else {
                                // 击中Boss特效
                                for(let p=0;p<8;p++) hitEffects.push({ x:e.x+(Math.random()-0.5)*20, y:e.y+(Math.random()-0.5)*20, life:0.5, size:3, color:"#ffaa55" });
                            }
                        } else {
                            killEnemy(j, e.x, e.y);
                        }
                        hit = true;
                        break;
                    }
                }
                if(hit) { bullets.splice(i,1); i--; }
            }
            
            // 敌人移动 (技能减速)
            let enemySpeedMul = skillActive ? 0.35 : 1.0;
            for(let i=0;i<enemies.length;i++) {
                let e = enemies[i];
                let dxE = player.x - e.x, dyE = player.y - e.y;
                let len = Math.hypot(dxE, dyE);
                if(len>0.01) {
                    let move = e.speed * enemySpeedMul;
                    e.x += (dxE/len)*move;
                    e.y += (dyE/len)*move;
                }
                if(e.x + e.radius < -120 || e.x - e.radius > W+120 || e.y + e.radius < -120 || e.y - e.radius > H+150) {
                    enemies.splice(i,1); i--; continue;
                }
                let distToPlayer = Math.hypot(e.x - player.x, e.y - player.y);
                if(distToPlayer < e.radius + player.radius) {
                    damagePlayer(e.isBoss ? 2 : 1);
                    if(e.isBoss) { e.hp = Math.max(0, e.hp-3); if(e.hp<=0) killEnemy(i, e.x, e.y); }
                    else enemies.splice(i,1);
                    i--;
                }
            }
            
            // 收集物: 宝石&芯片
            for(let i=0;i<gems.length;i++) {
                let g = gems[i];
                let dist = Math.hypot(player.x - g.x, player.y - g.y);
                if(dist < player.radius + g.radius) {
                    if(g.isHealth) healPlayer(1);
                    else gemScore++;
                    hitEffects.push({ x:g.x, y:g.y, life:0.5, size:5, color:"#f7d44a" });
                    gems.splice(i,1); i--; continue;
                }
                let attract = 0.12;
                g.x += (player.x - g.x)*attract;
                g.y += (player.y - g.y)*attract;
            }
            for(let i=0;i<weaponChips.length;i++) {
                let chip = weaponChips[i];
                let dist = Math.hypot(player.x - chip.x, player.y - chip.y);
                if(dist < player.radius + 10) {
                    upgradeWeapon();
                    hitEffects.push({ x:chip.x, y:chip.y, life:0.7, size:8, color:"#ffaa33" });
                    weaponChips.splice(i,1); i--;
                } else {
                    chip.x += (player.x - chip.x)*0.08;
                    chip.y += (player.y - chip.y)*0.08;
                }
            }
            
            // 敌人生成
            if(enemySpawnCounter <= 0 && !bossActive) {
                let spawnNum = (killCount>20 && Math.random()<0.3) ? 2 : 1;
                for(let s=0;s<spawnNum;s++) if(enemies.length<28) spawnEnemy();
                let dynamicDelay = Math.max(24, enemySpawnBaseDelay - Math.floor(killCount/18));
                enemySpawnCounter = dynamicDelay;
            } else enemySpawnCounter--;
            
            updateUI();
        }
        
        // 绘图模块 (含boss血条等)
        function draw() {
            ctx.clearRect(0,0,W,H);
            let grad = ctx.createLinearGradient(0,0,0,H);
            grad.addColorStop(0,"#030221"); grad.addColorStop(1,"#110a30");
            ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);
            for(let i=0;i<120;i++) { ctx.fillStyle = `rgba(255,240,200,${0.15+Math.sin(Date.now()*0.002+i)*0.1})`;
                ctx.beginPath(); ctx.arc((i*173)%W,(i*257)%H,1.2,0,Math.PI*2); ctx.fill(); }
            
            // 芯片
            for(let c of weaponChips) {
                ctx.fillStyle = "#ffaa33"; ctx.shadowBlur=8;
                ctx.beginPath(); ctx.arc(c.x, c.y, 8, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "white"; ctx.font="bold 12px monospace"; ctx.fillText("⚡", c.x-4, c.y+4);
            }
            // 宝石
            for(let g of gems) {
                ctx.fillStyle = g.isHealth ? "#ff8c7a" : "#ffdf80";
                ctx.beginPath(); ctx.arc(g.x, g.y, g.radius-1,0,Math.PI*2); ctx.fill();
                if(g.isHealth) ctx.fillStyle = "white", ctx.fillText("❤️", g.x-5, g.y+4);
                else ctx.fillStyle = "#ffb347", ctx.beginPath(), ctx.arc(g.x, g.y, g.radius-3,0,Math.PI*2), ctx.fill();
            }
            // 子弹
            for(let b of bullets) { ctx.fillStyle="#f0f062"; ctx.fillRect(b.x-3,b.y-6,6,12); ctx.fillStyle="white"; ctx.fillRect(b.x-1.5,b.y-10,3,6); }
            // 敌人+Boss血条
            for(let e of enemies) {
                ctx.fillStyle = e.color; ctx.beginPath(); ctx.arc(e.x, e.y, e.radius-2,0,Math.PI*2); ctx.fill();
                if(e.isBoss) {
                    ctx.fillStyle = "#5a2a1a"; ctx.fillRect(e.x-35, e.y-25, 70, 10);
                    ctx.fillStyle = "#ff5544"; ctx.fillRect(e.x-35, e.y-25, 70 * (e.hp/e.maxHp), 8);
                    ctx.fillStyle = "#fff5cc"; ctx.font="bold 12px monospace"; ctx.fillText(`BOSS ${e.hp}/${e.maxHp}`, e.x-28, e.y-28);
                }
                ctx.fillStyle="#2c1e2a"; ctx.beginPath(); ctx.ellipse(e.x-3,e.y-2,2,3,0,0,Math.PI*2); ctx.fill();
                ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(e.x-4,e.y-3,1.2,0,Math.PI*2); ctx.fill();
                ctx.fillStyle="#ff5533"; ctx.beginPath(); ctx.ellipse(e.x+2,e.y+2,3,2,0,0,Math.PI*2); ctx.fill();
            }
            // 玩家
            ctx.shadowBlur=12; let invFlash = (invincibleFrames>0 && (Math.floor(Date.now()/50)%3===0));
            ctx.fillStyle = invFlash ? "#f5bc70" : "#6dc6ff";
            ctx.beginPath(); ctx.moveTo(player.x, player.y-18); ctx.lineTo(player.x-15, player.y+5); ctx.lineTo(player.x-5, player.y+2);
            ctx.lineTo(player.x-5, player.y+12); ctx.lineTo(player.x, player.y+8); ctx.lineTo(player.x+5, player.y+12);
            ctx.lineTo(player.x+5, player.y+2); ctx.lineTo(player.x+15, player.y+5); ctx.fill();
            ctx.fillStyle="#aae0ff"; ctx.beginPath(); ctx.arc(player.x, player.y-8, 8,0,Math.PI*2); ctx.fill();
            // 血条
            ctx.fillStyle="#330000"; ctx.fillRect(player.x-30, player.y-32, 60, 10);
            ctx.fillStyle="#ff5555"; ctx.fillRect(player.x-30, player.y-32, 60*(player.hp/player.maxHp), 8);
            ctx.fillStyle="white"; ctx.font="bold 10px monospace"; ctx.fillText(`${player.hp}/${player.maxHp}`, player.x-18, player.y-34);
            // 特效
            for(let i=0;i<hitEffects.length;i++) { let p=hitEffects[i]; ctx.globalAlpha=p.life; ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill(); p.life-=0.03; if(p.life<=0){hitEffects.splice(i,1); i--;} }
            ctx.globalAlpha=1; ctx.shadowBlur=0;
            if(!gameActive) { ctx.font="bold 32px monospace"; ctx.fillStyle="#ffdfb3"; ctx.fillText("💀 战败 💀", W/2-100, H/2-40); ctx.font="20px monospace"; ctx.fillStyle="#f7c56e"; ctx.fillText(`宝石:${gemScore} 击杀:${killCount}`, W/2-115, H/2+30);}
            if(skillActive) { ctx.font="bold 20px monospace"; ctx.fillStyle="#88ffaa"; ctx.shadowBlur=5; ctx.fillText("⚡ 时缓领域 ⚡", W/2-90, 50); }
        }
        
        // 控制事件
        function handleMove(clientX) {
            if(!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            let canvasX = (clientX - rect.left) * (canvas.width/rect.width);
            canvasX = Math.min(Math.max(canvasX, player.radius+5), W - player.radius-5);
            targetX = canvasX;
        }
        function onPointerMove(e) { e.preventDefault(); let cx = e.clientX; if(e.touches) cx = e.touches[0].clientX; handleMove(cx); }
        function initEvents() {
            canvas.addEventListener('mousemove', onPointerMove);
            canvas.addEventListener('touchmove', onPointerMove, {passive:false});
            canvas.addEventListener('touchstart', (e)=>{ e.preventDefault(); if(e.touches) handleMove(e.touches[0].clientX); });
        }
        // 技能释放
        function castSkill() {
            if(!gameActive) return;
            if(skillCooldownTimer <= 0 && !skillActive) {
                skillActive = true;
                skillRemaining = SKILL_DURATION;
                skillCooldownTimer = SKILL_COOLDOWN_MAX;
                updateUI();
                for(let i=0;i<30;i++) hitEffects.push({ x:player.x+(Math.random()-0.5)*60, y:player.y+(Math.random()-0.5)*50, life:0.8, size:5, color:"#88ddff"});
            }
        }
        // 重置完全 (游戏内)
        function fullReset() {
            resetGame();
            gameActive = true;
            bossActive = false;
        }
